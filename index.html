<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<!-- 提前套用主題設定，避免翻轉閃爍 -->
<script>
(function(){
  try{
    var pref = localStorage.getItem('theme_pref') || 'system';
    var effective = pref;
    if(pref === 'system'){
      effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', effective);
  }catch(e){}
})();
</script>
<!-- 使用自己上傳的圖片當作網站 Icon -->
<link rel="icon" type="image/png" href="icon.png">
<meta charset="UTF-8">
<!-- 手機全螢幕 App 必備設定 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="年度記帳">
<title>年度記帳管理 App</title>

<!-- 連結至手機 App 設定檔 -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- 引入 Supabase 官方 SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0B0D12; --surface:#151822; --surface-2:#1D2130; --border:rgba(255,255,255,0.08);
  --text:#F2F3F6; --text-2:#9BA1B0; --text-3:#6B7280;
  --blue:#5B8DEF; --blue-soft:rgba(91,141,239,0.16);
  --pink:#EC6FA0; --pink-soft:rgba(236,111,160,0.16);
  --green:#34C77B; --green-soft:rgba(52,199,123,0.15);
  --amber:#E8A33D; --amber-soft:rgba(232,163,61,0.15);
  --red:#E8556A; --red-soft:rgba(232,85,106,0.15);
  --radius:16px; --radius-sm:10px;
  --food:#EC6FA0; --fun:#5B8DEF; --fixed:#8C90A6; --misc:#5B6272;
  /* 毛玻璃材質（深色） */
  --glass:rgba(21,24,34,0.5); --glass-2:rgba(29,33,48,0.4); --glass-bar:rgba(11,13,18,0.38);
  --toast-glass:rgba(242,243,246,0.88);
  --wallpaper:
    radial-gradient(at 15% -10%, rgba(91,141,239,0.38) 0, transparent 55%),
    radial-gradient(at 85% 0%, rgba(236,111,160,0.32) 0, transparent 55%),
    radial-gradient(at 50% 100%, rgba(52,199,123,0.16) 0, transparent 60%),
    #0B0D12;
}
:root[data-theme="light"]{
  --bg:#F5F6FA; --surface:#FFFFFF; --surface-2:#F0F1F6; --border:rgba(15,17,20,0.08);
  --text:#171921; --text-2:#5B6472; --text-3:#8A93A3;
  --blue:#3E71D6; --blue-soft:rgba(62,113,214,0.10);
  --pink:#D6488B; --pink-soft:rgba(214,72,139,0.10);
  --green:#1F9A5E; --green-soft:rgba(31,154,94,0.10);
  --amber:#C57F17; --amber-soft:rgba(197,127,23,0.10);
  --red:#D0364E; --red-soft:rgba(208,54,78,0.10);
  --food:#D6488B; --fun:#3E71D6; --fixed:#7A7F92; --misc:#9CA1B0;
  /* 毛玻璃材質（淺色） */
  --glass:rgba(255,255,255,0.5); --glass-2:rgba(240,241,246,0.44); --glass-bar:rgba(245,246,250,0.42);
  --toast-glass:rgba(23,25,33,0.85);
  --wallpaper:
    radial-gradient(at 15% -10%, rgba(62,113,214,0.20) 0, transparent 55%),
    radial-gradient(at 85% 0%, rgba(214,72,139,0.16) 0, transparent 55%),
    radial-gradient(at 50% 100%, rgba(31,154,94,0.12) 0, transparent 60%),
    #F5F6FA;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--wallpaper); background-attachment:fixed; background-size:cover;
  color:var(--text); font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh; padding-bottom:88px;
}
h1,h2,h3,.num-lg{font-family:'Sora',sans-serif;}
.num,.num-lg{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
button,input,select{font-family:inherit; color:inherit;}
.icon{vertical-align:-3px; flex-shrink:0;}

/* 金鑰設定面板樣式 */
.config-panel {
  background: var(--glass-2); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
  padding: 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; display: flex; flex-direction: column; gap: 10px; max-width: 520px; margin: 0 auto;
  border-radius: var(--radius-sm); margin-top: calc(10px + env(safe-area-inset-top, 0px));
}
.config-panel input {
  width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border);
  background: var(--surface); color: var(--text);
}

.app-bar{
  position:sticky; top:0; z-index:20; background:var(--glass-bar);
  backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
  padding:calc(14px + env(safe-area-inset-top, 0px)) 18px 10px; display:flex; align-items:center; justify-content:space-between;
}
.app-bar .brand{display:flex; align-items:center; gap:10px; min-width:0;}
.brand-icon{
  width:34px; height:34px; border-radius:10px; flex-shrink:0; overflow:hidden;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.25);
}
.brand-icon img{width:100%; height:100%; object-fit:cover; display:block;}
.brand-icon svg{flex-shrink:0;}
.app-bar h1{
  font-size:19px; font-weight:700; margin:0; letter-spacing:-0.2px; white-space:nowrap;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.app-bar .sub{font-size:12px; color:var(--text-3); margin-top:2px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:0.5px solid var(--border);
  background:var(--glass-2); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; color:var(--text-2); flex-shrink:0;
}
.view{display:none; padding:6px 16px 24px; max-width:520px; margin:0 auto;}
.view.active{display:block;}
#root{will-change:transform, opacity;}
.slide-out-left{animation:slideOutLeft 0.15s ease forwards;}
.slide-out-right{animation:slideOutRight 0.15s ease forwards;}
.slide-in-left{animation:slideInLeft 0.22s ease;}
.slide-in-right{animation:slideInRight 0.22s ease;}
@keyframes slideOutLeft{ to{ transform:translateX(-28px); opacity:0.3; } }
@keyframes slideOutRight{ to{ transform:translateX(28px); opacity:0.3; } }
@keyframes slideInLeft{ from{ transform:translateX(-28px); opacity:0.3; } to{ transform:translateX(0); opacity:1; } }
@keyframes slideInRight{ from{ transform:translateX(28px); opacity:0.3; } to{ transform:translateX(0); opacity:1; } }
.card{
  background:var(--glass); backdrop-filter:blur(26px) saturate(180%); -webkit-backdrop-filter:blur(26px) saturate(180%);
  border:0.5px solid var(--border); border-radius:var(--radius);
  padding:18px; margin-bottom:14px;
}
.card-title{font-size:13px; color:var(--text-2); font-weight:500; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between;}
.row{display:flex; align-items:center; justify-content:space-between;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat-box{background:var(--surface-2); border-radius:var(--radius-sm); padding:12px 14px;}
.stat-label{font-size:12px; color:var(--text-3); margin-bottom:4px;}
.stat-value{font-size:19px; font-weight:600;}
.stat-value.pink{color:var(--pink);}
.stat-value.blue{color:var(--blue);}
.stat-value.green{color:var(--green);}

.ring-wrap{display:flex; align-items:center; gap:16px; margin-top:4px;}
.ring{
  width:96px;height:96px;border-radius:50%; flex-shrink:0;
  display:flex;align-items:center;justify-content:center; position:relative;
}
.ring::before{
  content:""; position:absolute; inset:0; border-radius:50%;
  background:conic-gradient(from -90deg, var(--blue) 0%, var(--pink) var(--p, 0%), var(--surface-2) var(--p,0%));
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
  mask:radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
}
.ring span{font-size:16px; font-weight:700; z-index:1;}
.legend{display:flex; gap:14px; font-size:12px; color:var(--text-2); margin-top:10px;}
.dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:5px;}

.bonus-row{display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:14px; border-top:0.5px solid var(--border);}
.bonus-row label{font-size:13px; color:var(--text-2);}
.inline-input{
  background:var(--surface-2); border:0.5px solid var(--border); border-radius:var(--radius-sm);
  padding:8px 10px; font-size:14px; color:var(--text); width:110px; text-align:right;
}

.wish-item{margin-bottom:16px;}
.wish-item:last-child{margin-bottom:0;}
.wish-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
.wish-name{font-size:14px; font-weight:500;}
.wish-amt{font-size:12px; color:var(--text-2);}
.bar-track{height:8px; background:var(--surface-2); border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; border-radius:5px; background:linear-gradient(90deg,var(--blue),var(--pink));}
.wish-edit{display:flex; gap:8px; margin-top:8px; align-items:center;}
.wish-edit input{flex:1;}
.manual-extra-btn{
  width:100%; margin-top:8px; padding:9px 12px; border-radius:var(--radius-sm);
  border:0.5px dashed var(--border); background:var(--surface-2); color:var(--text-2);
  font-size:13px; cursor:pointer; text-align:left;
}

.stacked-bar{height:14px; border-radius:7px; overflow:hidden; display:flex; margin:6px 0 12px;}
.legend-list{display:flex; flex-direction:column; gap:8px;}
.legend-row{display:flex; align-items:center; justify-content:space-between; font-size:13px;}
.legend-row .left{display:flex; align-items:center; color:var(--text-2);}
.legend-row .right{font-weight:500;}

.month-scroll{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 10px; -ms-overflow-style:none; scrollbar-width:none;}
.month-scroll::-webkit-scrollbar{display:none;}
.month-nav-row{display:flex; align-items:center; gap:6px;}
.month-arrow{width:32px; height:32px; font-size:17px; flex-shrink:0;}
.icon-btn:disabled{opacity:0.3; cursor:default;}
.chip{
  flex-shrink:0; padding:8px 16px; border-radius:20px; border:0.5px solid var(--border);
  background:var(--surface); font-size:14px; color:var(--text-2); cursor:pointer; white-space:nowrap;
}
.chip.active{background:var(--text); color:var(--bg); border-color:var(--text); font-weight:600;}

.budget-item{margin-bottom:12px;}
.budget-item:last-child{margin-bottom:0;}
.budget-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;}
.budget-top .name{color:var(--text-2);}
.budget-top .amt{color:var(--text);}

.tx-row{
  display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:0.5px solid var(--border);
}
.tx-row:last-child{border-bottom:none;}
.tx-tag{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.tx-mid{flex:1; min-width:0;}
.tx-cat{font-size:14px; font-weight:500;}
.tx-note{font-size:12px; color:var(--text-3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.tx-amt{font-size:15px; font-weight:600; flex-shrink:0;}
.tx-del{
  width:30px;height:30px; border-radius:50%; border:none; background:transparent;
  color:var(--text-3); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.empty-hint{text-align:center; padding:28px 10px; color:var(--text-3); font-size:13px;}

.income-edit{display:flex; gap:8px; margin-top:10px;}
.income-edit .field{flex:1;}
.income-edit label{font-size:11px; color:var(--text-3); display:block; margin-bottom:4px;}
.income-edit input{width:100%; padding:9px 10px; border-radius:var(--radius-sm); border:0.5px solid var(--border); background:var(--surface-2);}

.fab{
  position:fixed; right:20px; bottom:88px; width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--pink)); border:none; color:#fff;
  font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,0.35); z-index:30; display:none;
}
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; background:var(--glass-bar);
  backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
  border-top:0.5px solid var(--border);
  display:flex; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:25;
}
.nav-btn{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px;
  color:var(--text-3); font-size:10.5px; cursor:pointer; padding:4px 0 6px;
}
.nav-icon{
  font-size:19px; width:46px; height:28px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s ease, transform 0.2s ease;
}
.nav-btn.active{color:var(--text); font-weight:600;}
.nav-btn.active .nav-icon{
  background:linear-gradient(135deg,var(--blue-soft),var(--pink-soft));
  transform:translateY(-1px);
}

.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  z-index:50; display:none;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal-sheet{
  width:100%; max-width:520px; background:var(--glass);
  backdrop-filter:blur(32px) saturate(180%); -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
}
.modal-sheet h3{margin:0 0 16px; font-size:17px;}
.field-group{margin-bottom:14px;}
.field-group label{font-size:12px; color:var(--text-2); display:block; margin-bottom:6px;}
.field-group select, .field-group input{
  width:100%; padding:11px 12px; border-radius:var(--radius-sm); border:0.5px solid var(--border);
  background:var(--surface-2); font-size:15px;
}
.chip-row{display:flex; gap:8px; flex-wrap:wrap;}
.chip-select{
  padding:8px 14px; border-radius:20px; border:0.5px solid var(--border); background:var(--surface-2);
  font-size:13px; color:var(--text-2); cursor:pointer;
}
.chip-select.sel{background:var(--text); color:var(--bg); border-color:var(--text); font-weight:600;}
.modal-actions{display:flex; gap:10px; margin-top:6px;}
.btn{
  flex:1; padding:13px; border-radius:var(--radius-sm); border:0.5px solid var(--border);
  background:var(--surface-2); font-size:15px; font-weight:600; cursor:pointer; color:var(--text);
}
.btn.primary{background:linear-gradient(135deg,var(--blue),var(--pink)); color:#fff; border:none;}

.settings-section{margin-bottom:18px;}
.settings-section h3{font-size:14px; margin:0 0 10px; color:var(--text-2); font-weight:500;}
.settings-back-row{display:flex; align-items:center; gap:10px; margin:2px 2px 14px;}
.settings-back-title{font-size:16px; font-weight:700;}
.pm-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:0.5px solid var(--border); font-size:14px;}
.pm-row:last-child{border-bottom:none;}
.add-pm-row{display:flex; gap:8px; margin-top:10px;}
.add-pm-row input{flex:1;}
.small-btn{padding:9px 14px; border-radius:var(--radius-sm); border:0.5px solid var(--border); background:var(--surface-2); font-size:13px; cursor:pointer;}

.snackbar{
  position:fixed; bottom:96px; left:16px; right:16px; max-width:488px; margin:0 auto;
  background:var(--toast-glass); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%);
  color:var(--bg); border-radius:var(--radius-sm); padding:13px 16px;
  display:none; align-items:center; justify-content:space-between; font-size:13px; z-index:60;
}
.snackbar.show{display:flex;}
.snackbar button{background:none; border:none; color:var(--pink); font-weight:600; font-size:13px; cursor:pointer;}
.loading{padding:60px 20px; text-align:center; color:var(--text-3); font-size:14px; max-width:520px; margin:0 auto;}
</style>
</head>
<body>

<div class="config-panel" id="configPanel" style="display: none;">
  <div><strong><svg class="icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M17.5 19H6a4 4 0 1 1 .9-7.9A5.5 5.5 0 0 1 17.5 10a3.5 3.5 0 0 1 0 9Z"/></svg> 填入 Supabase 連線資訊：</strong></div>
  <input type="text" id="dbUrl" placeholder="請貼上 Supabase Project URL">
  <input type="password" id="dbKey" placeholder="請貼上 Supabase Anon Key">
  <button class="btn primary" style="padding:8px;" onclick="saveConfigKeys()">儲存連線並載入</button>
</div>

<div class="app-bar">
  <div class="brand">
    <div class="brand-icon" id="brandIcon">
      <img src="icon.png" alt="" onerror="brandIconFallback()">
    </div>
    <div style="min-width:0;">
      <h1 id="barTitle">年度記帳管理 App</h1>
      <div class="sub" id="barSub">2026 年度總覽</div>
    </div>
  </div>
  <button class="icon-btn" onclick="switchView('settings')" aria-label="設定"><svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><circle cx="9" cy="6" r="2"/><path d="M4 12h16"/><circle cx="15" cy="12" r="2"/><path d="M4 18h16"/><circle cx="8" cy="18" r="2"/></svg></button>
</div>

<div id="root">
  <div class="loading">正在偵測本地金鑰設定...</div>
</div>

<button class="fab" id="fabBtn" onclick="openModal()" aria-label="新增帳目">＋</button>

<div class="bottom-nav">
  <button class="nav-btn active" id="btn-dashboard" onclick="switchView('dashboard')">
    <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M4 19h16"/></svg></span><span>總覽</span>
  </button>
  <button class="nav-btn" id="btn-ledger" onclick="switchView('ledger')">
    <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg></span><span>記帳</span>
  </button>
  <button class="nav-btn" id="btn-settings" onclick="switchView('settings')">
    <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><circle cx="9" cy="6" r="2"/><path d="M4 12h16"/><circle cx="15" cy="12" r="2"/><path d="M4 18h16"/><circle cx="8" cy="18" r="2"/></svg></span><span>設定</span>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <h3>新增一筆帳目</h3>
    <div class="field-group">
      <label>月份</label>
      <select id="txMonth"></select>
    </div>
    <div class="field-group">
      <label>付款方式</label>
      <div class="chip-row" id="pmChips"></div>
    </div>
    <div class="field-group">
      <label>類別</label>
      <div class="chip-row" id="catChips"></div>
    </div>
    <div class="field-group">
      <label>金額</label>
      <input type="number" id="txAmount" inputmode="decimal" placeholder="0">
    </div>
    <div class="field-group">
      <label>備註（選填）</label>
      <input type="text" id="txNote" placeholder="例如：房租、Costco…">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveTransaction()">儲存</button>
    </div>
  </div>
</div>

<div class="snackbar" id="snackbar">
  <span id="snackbarText"></span>
  <button id="snackbarUndo" onclick="undoDelete()">復原</button>
</div>

<script>

function checkKeys() {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  if (url && key) {
    document.getElementById('dbUrl').value = url;
    document.getElementById('dbKey').value = key;
    initSupabase(url, key);
  } else {
    document.getElementById('configPanel').style.display = 'flex';
    document.getElementById('root').innerHTML = '<div class="loading">請在上方欄位輸入你的 Supabase 連線資訊。</div>';
  }
}

function saveConfigKeys() {
  const url = document.getElementById('dbUrl').value.trim();
  const key = document.getElementById('dbKey').value.trim();
  if(!url || !key) { alert('請完整填入 URL 與 Key'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  initSupabase(url, key);
}

function initSupabase(url, key) {
  try {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(url, key);
      document.getElementById('configPanel').style.display = 'none';
      loadState();
      setupRealtimeSync();
    } else {
      setTimeout(() => initSupabase(url, key), 2000);
    }
  } catch(e) {
    document.getElementById('configPanel').style.display = 'flex';
    document.getElementById('root').innerHTML = '<div class="loading" style="color:var(--red)">連線失敗，請檢查金鑰。</div>';
  }
}

let realtimeChannel = null;
function setupRealtimeSync(){
  if (!supabaseClient || realtimeChannel) return;
  try {
    realtimeChannel = supabaseClient
      .channel('app_state_sync')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'app_state', filter: 'id=eq.1' }, payload => {
        if (payload && payload.new && payload.new.content) {
          handleRemoteStateChange(payload.new.content);
        }
      })
      .subscribe();
  } catch(e) {}
}

function handleRemoteStateChange(newContent){
  if (!state) { state = newContent; render(); return; }
  if (!deepEqual(state, newContent)) {
    const message = describeStateDiff(state, newContent);
    // 若使用者正在編輯「手動加碼」輸入框，先保留目前輸入中的值，重繪後再還原，避免被遠端更新蓋掉
    const preserved = {};
    ['travel','house'].forEach(k=>{
      if(manualExtraEditing[k]){
        const el = document.getElementById('manualExtraInput-'+k);
        if(el) preserved[k] = el.value;
      }
    });
    state = newContent;
    render();
    Object.keys(preserved).forEach(k=>{
      const el = document.getElementById('manualExtraInput-'+k);
      if(el) el.value = preserved[k];
    });
    pushNotify(message || '資料已更新（其他裝置變更）');
  }
}

function deepEqual(a, b){
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a === null || b === null) return a === b;
  if (typeof a !== 'object') return a === b;
  if (Array.isArray(a) !== Array.isArray(b)) return false;
  if (Array.isArray(a)) {
    if (a.length !== b.length) return false;
    for (let i=0; i<a.length; i++) { if (!deepEqual(a[i], b[i])) return false; }
    return true;
  }
  const ak = Object.keys(a), bk = Object.keys(b);
  if (ak.length !== bk.length) return false;
  for (const k of ak) { if (!deepEqual(a[k], b[k])) return false; }
  return true;
}

function describeStateDiff(oldS, newS){
  try {
    const oldTx = oldS.transactions || [], newTx = newS.transactions || [];
    if (newTx.length > oldTx.length) {
      const oldIds = new Set(oldTx.map(t=>t.id));
      const added = newTx.filter(t=>!oldIds.has(t.id));
      if (added.length) {
        const t = added[added.length-1];
        return `${t.method || '其他裝置'} 新增一筆帳目：${t.category} NT$ ${fmt(t.amount)}`;
      }
      return '其他裝置新增了一筆帳目';
    }
    if (newTx.length < oldTx.length) return '其他裝置刪除了一筆帳目';

    if (Number(oldS.bonus||0) !== Number(newS.bonus||0)) return '其他裝置更新了年終／獎金';
    if (Number(oldS.annualGoal||0) !== Number(newS.annualGoal||0)) return '其他裝置更新了年度存款目標';

    const ot = oldS.wishlist?.travel||{}, nt = newS.wishlist?.travel||{};
    if (Number(ot.target||0) !== Number(nt.target||0)) return '其他裝置更新了出國基金目標金額';
    if (Number(ot.threshold||0) !== Number(nt.threshold||0)) return '其他裝置更新了每月可存門檻';
    if (Number(ot.manualExtra||0) !== Number(nt.manualExtra||0)) return '其他裝置更新了出國基金手動加碼';

    const oh = oldS.wishlist?.house||{}, nh = newS.wishlist?.house||{};
    if (Number(oh.target||0) !== Number(nh.target||0)) return '其他裝置更新了房子頭期款目標金額';
    if (Number(oh.manualExtra||0) !== Number(nh.manualExtra||0)) return '其他裝置更新了房子頭期款手動加碼';

    for (const c of MAIN_CATS) {
      if (Number(oldS.budgets?.[c]||0) !== Number(newS.budgets?.[c]||0)) return `其他裝置更新了${c}預算上限`;
    }
    for (const m of MONTHS) {
      const oi = oldS.income?.[m]||{}, ni = newS.income?.[m]||{};
      if (Number(oi.xuan||0) !== Number(ni.xuan||0) || Number(oi.wei||0) !== Number(ni.wei||0)) {
        return `其他裝置更新了${MONTH_LABEL(m)}的收入`;
      }
    }
    return '其他裝置更新了資料';
  } catch(e) { return '其他裝置更新了資料'; }
}

async function loadState(){
  if (!supabaseClient) return;
  try {
    const { data, error } = await supabaseClient.from('app_state').select('content').eq('id', 1).single();
    if (error || !data) {
      state = seedData();
      await saveState();
    } else {
      state = data.content;
    }
  } catch(e) {
    state = seedData();
  }
  render();
}

async function saveState(){
  if (!supabaseClient || !state) return;
  try {
    await supabaseClient.from('app_state').upsert({ id: 1, content: state });
  } catch(e) {}
}

function getThemePref(){ return localStorage.getItem('theme_pref') || 'system'; }
function getEffectiveTheme(){
  const pref = getThemePref();
  if(pref === 'system'){
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  return pref;
}
function applyTheme(){
  document.documentElement.setAttribute('data-theme', getEffectiveTheme());
}
function setThemePref(pref){
  localStorage.setItem('theme_pref', pref);
  applyTheme();
  render();
}
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(){
    if(getThemePref() === 'system') applyTheme();
  });
}

let swipeStartX = 0, swipeStartY = 0, swipeStartTarget = null;
function handleSwipeStart(e){
  if(currentView !== 'ledger') return;
  if(document.getElementById('modalOverlay').classList.contains('show')) return;
  const t = e.touches[0];
  swipeStartX = t.clientX; swipeStartY = t.clientY; swipeStartTarget = e.target;
}
function handleSwipeEnd(e){
  if(currentView !== 'ledger') return;
  if(!swipeStartTarget) return;
  if(swipeStartTarget.closest && swipeStartTarget.closest('.month-scroll')){ swipeStartTarget = null; return; }
  if(document.getElementById('modalOverlay').classList.contains('show')){ swipeStartTarget = null; return; }
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = t.clientY - swipeStartY;
  swipeStartTarget = null;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    shiftMonth(dx < 0 ? 1 : -1);
  }
}
window.addEventListener('DOMContentLoaded', function(){
  applyTheme(); checkKeys();
  const root = document.getElementById('root');
  root.addEventListener('touchstart', handleSwipeStart, {passive:true});
  root.addEventListener('touchend', handleSwipeEnd, {passive:true});
});

function monthSpend(m){ return (state.transactions || []).filter(t=>t.month===m).reduce((s,t)=>s+Number(t.amount||0),0); }
function monthCatSpend(m,cat){ return (state.transactions || []).filter(t=>t.month===m && t.category===cat).reduce((s,t)=>s+Number(t.amount||0),0); }
function monthIncome(m){ const inc = (state.income && state.income[m]) || {xuan:0,wei:0}; return Number(inc.xuan||0) + Number(inc.wei||0); }
function monthBalance(m){ return monthIncome(m) - monthSpend(m); }

const TRACK_YEAR = 2026;
function monthHasOccurred(m){
  const today = new Date();
  if(today.getFullYear() > TRACK_YEAR) return true;
  if(today.getFullYear() < TRACK_YEAR) return false;
  // 只統計到「上個月」，本月尚未結束不列入年度可存計算
  return parseInt(m,10) < (today.getMonth()+1);
}
function occurredMonths(){ return MONTHS.filter(monthHasOccurred); }
function lastOccurredLabel(){
  const om = occurredMonths();
  if(!om.length) return '尚未開始';
  return MONTH_LABEL(om[0]) + '–' + MONTH_LABEL(om[om.length-1]);
}

function annualSpend(){ return MONTHS.reduce((s,m)=>s+monthSpend(m),0); }
function annualSave(){ return occurredMonths().reduce((s,m)=>s+monthBalance(m),0); }
function annualIncome(){ return occurredMonths().reduce((s,m)=>s+monthIncome(m),0); }
function annualCatSpend(cat){ return MONTHS.reduce((s,m)=>s+monthCatSpend(m,cat),0); }

function travelSaved(){
  const travel = state.wishlist?.travel || {target:100000, threshold:70000, manualExtra:0};
  const auto = occurredMonths().reduce((s,m)=>{
    const b = monthBalance(m);
    return s + (b > travel.threshold ? (b - travel.threshold) : 0);
  },0);
  return auto + Number(travel.manualExtra||0);
}
function houseSaved(){
  const travel = state.wishlist?.travel || {target:100000, threshold:70000, manualExtra:0};
  const house = state.wishlist?.house || {target:6000000, manualExtra:0};
  const auto = occurredMonths().reduce((s,m)=>{
    const b = monthBalance(m);
    return s + Math.min(Math.max(b,0), travel.threshold);
  },0);
  return auto + Number(house.manualExtra||0);
}

function fmt(n){ return Math.round(n || 0).toLocaleString('zh-TW'); }
function fmtCompact(n){
  n = Math.round(n || 0);
  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  if(abs >= 10000){
    const w = abs / 10000;
    return sign + (Number.isInteger(w) ? w.toFixed(0) : w.toFixed(1)) + '萬';
  }
  return sign + abs.toLocaleString('zh-TW');
}
function pct(n){ return ((n || 0)*100).toFixed(1)+'%'; }
function clamp01(n){ return Math.max(0, Math.min(1, n)); }

function switchView(v){
  if(v === 'settings' && currentView !== 'settings'){
    settingsReturnView = currentView;
  }
  if(v !== 'dashboard'){
    manualExtraEditing = {travel:false, house:false};
  }
  if(v !== 'settings'){
    resetConfirmArmed = false;
  }
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.id===`btn-${v}`));
  document.getElementById('fabBtn').style.display = (v==='ledger' || v==='dashboard') ? 'flex' : 'none';
  render();
}

function updateBarSub(){
  const el = document.getElementById('barSub');
  if(!el) return;
  el.textContent = currentView==='dashboard' ? (state.dashboardTitle || '2026 年度總覽')

function render(){
  if(!state) return;
  const root = document.getElementById('root');
  if(currentView==='dashboard') root.innerHTML = renderDashboard();
  else if(currentView==='ledger') root.innerHTML = renderLedger();
  else root.innerHTML = renderSettings();
  updateBarSub();
}

function renderDashboard(){
  const totalSpend = annualSpend();
  const totalSave = annualSave();
  const income = annualIncome();
  const bonus = Number(state.bonus||0);
  const goal = Number(state.annualGoal||1000000);
  const totalSaveWithBonus = totalSave + bonus;
  const goalProgress = goal>0 ? clamp01(totalSaveWithBonus/goal) : 0;
  const distance = Math.max(0, goal - totalSaveWithBonus);

  const catAllTotal = DASH_CATS.reduce((s,c)=>s+annualCatSpend(c),0);

  let stackedBar = DASH_CATS.map(c=>{
    const v = annualCatSpend(c);
    const w = catAllTotal>0 ? (v/catAllTotal*100) : 0;
    return `<div style="width:${w}%; background:${CAT_COLOR[c]}"></div>`;
  }).join('');

  let legendRows = DASH_CATS.map(c=>{
    const v = annualCatSpend(c);
    const ofIncome = income>0 ? v/income : 0;
    return `<div class="legend-row">
      <div class="left"><span class="dot" style="background:${CAT_COLOR[c]}"></span>${CAT_LABEL[c]}</div>
      <div class="right">NT$ ${fmt(v)} <span style="color:var(--text-3)">${pct(ofIncome)}</span></div>
    </div>`;
  }).join('');

  const maxMonthSpend = Math.max(1, ...MONTHS.map(monthSpend));
  const monthBars = MONTHS.map(m=>{
    const v = monthSpend(m);
    const h = Math.round((v/maxMonthSpend)*54)+6;
    const active = v>0 ? 'var(--blue)' : 'var(--surface-2)';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
      <div style="width:100%; max-width:22px; height:${h}px; border-radius:6px; background:${active};"></div>
      <div style="font-size:10px; color:var(--text-3);">${m}月</div>
    </div>`;
  }).join('');

  const travel = state.wishlist?.travel || {target:100000, threshold:70000, manualExtra:0};
  const travelThreshold = Number(travel.threshold||70000);
  const tSaved = travelSaved();
  const tProg = travel.target>0 ? clamp01(tSaved/travel.target) : 0;
  const house = state.wishlist?.house || {target:6000000, manualExtra:0};
  const hSaved = houseSaved();
  const hProg = house.target>0 ? clamp01(hSaved/house.target) : 0;

  return `
  <div class="view active">
    <div class="card">
      <div class="card-title">2026 年度存款目標</div>
      <div class="ring-wrap">
        <div class="ring" style="--p:${(goalProgress*100).toFixed(1)}%"><span>${(goalProgress*100).toFixed(0)}%</span></div>
        <div style="flex:1;">
          <div class="stat-label">距離存到 NT$ ${fmt(goal)}</div>
          <div class="stat-value" style="font-size:20px;">NT$ ${fmt(distance)}</div>
        </div>

function renderCategoryPie(month){
  const total = DASH_CATS.reduce((s,c)=>s+monthCatSpend(month,c),0);
  const size = 150, r = size/2, cx = r, cy = r;
  const nonZeroCats = DASH_CATS.filter(c=>monthCatSpend(month,c) > 0);
  let svgInner = '';

  if(total <= 0){
    svgInner = `<circle cx="${cx}" cy="${cy}" r="${r-2}" style="fill:var(--surface-2)"></circle>`;
  } else if(nonZeroCats.length === 1){
    svgInner = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${CAT_COLOR[nonZeroCats[0]]}"></circle>`;
  } else {
    let cumulative = 0;
    svgInner = DASH_CATS.map(c=>{
      const v = monthCatSpend(month,c);
      if(v <= 0) return '';
      const startAngle = (cumulative/total)*2*Math.PI - Math.PI/2;
      cumulative += v;
      const endAngle = (cumulative/total)*2*Math.PI - Math.PI/2;
      const largeArc = (endAngle-startAngle) > Math.PI ? 1 : 0;
      const x1 = (cx + r*Math.cos(startAngle)).toFixed(2), y1 = (cy + r*Math.sin(startAngle)).toFixed(2);
      const x2 = (cx + r*Math.cos(endAngle)).toFixed(2), y2 = (cy + r*Math.sin(endAngle)).toFixed(2);
      return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${CAT_COLOR[c]}"></path>`;
    }).join('');
  }
  if(total > 0){
    svgInner += `<circle cx="${cx}" cy="${cy}" r="${(r*0.64).toFixed(2)}" style="fill:var(--surface)"></circle>`;
  }

  const centerText = total > 0
    ? `<text x="${cx}" y="${cy-4}" text-anchor="middle" style="fill:var(--text); font-size:14px; font-weight:700; font-family:Sora,sans-serif;">NT$ ${fmtCompact(total)}</text>
       <text x="${cx}" y="${cy+14}" text-anchor="middle" style="fill:var(--text-2); font-size:10px;">本月花費</text>`
    : `<text x="${cx}" y="${cy+5}" text-anchor="middle" style="fill:var(--text-2); font-size:12px;">尚無資料</text>`;

  const legendRows = DASH_CATS.map(c=>{
    const v = monthCatSpend(month,c);
    const ofTotal = total>0 ? v/total : 0;
    return `<div class="legend-row">
      <div class="left"><span class="dot" style="background:${CAT_COLOR[c]}"></span>${CAT_LABEL[c]}</div>
      <div class="right">NT$ ${fmt(v)} <span style="color:var(--text-2)">${pct(ofTotal)}</span></div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">${MONTH_LABEL(month)} 花費類別</div>
    <div style="display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
      <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex-shrink:0;">${svgInner}${centerText}</svg>
      <div class="legend-list" style="flex:1; min-width:140px;">${legendRows}</div>
    </div>
  </div>`;
}

function notifSupported(){ return typeof Notification !== 'undefined'; }
function notifStatusText(){
  if(!notifSupported()) return '此瀏覽器不支援手機系統通知';
  if(Notification.permission==='granted') return icon('check',14)+' 已開啟手機通知';
  if(Notification.permission==='denied') return icon('warning',14)+' 通知已被封鎖，請至手機/瀏覽器設定中開啟';
  return '尚未開啟手機通知，請點下方按鈕開啟';
}
function requestNotifPermission(){
  if(!notifSupported()){ alert('此瀏覽器不支援手機系統通知功能'); return; }
  Notification.requestPermission().then(()=>{ render(); });
}
function pushNotify(text){
  if(notifSupported() && Notification.permission==='granted'){
    try{ new Notification('年度記帳管理', { body: text, icon: 'icon.png' }); }catch(e){}
  }
}
function notifyChange(text){ showSnackbar(text); pushNotify(text); }

let monthAnimating = false;
function animateMonthChange(direction, callback){
  const root = document.getElementById('root');
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!root || monthAnimating || reduceMotion){ callback(); return; }
  monthAnimating = true;
  const outClass = direction === 'left' ? 'slide-out-left' : 'slide-out-right';
  const inClass = direction === 'left' ? 'slide-in-right' : 'slide-in-left';
  root.classList.remove('slide-in-left','slide-in-right','slide-out-left','slide-out-right');
  root.classList.add(outClass);
  setTimeout(()=>{
    callback();
    root.classList.remove(outClass);
    root.classList.add(inClass);
    setTimeout(()=>{ root.classList.remove(inClass); monthAnimating = false; }, 220);
  }, 150);
}
function selectMonth(m){
  const oldIdx = MONTHS.indexOf(currentMonth), newIdx = MONTHS.indexOf(m);
  if(newIdx === oldIdx){ currentMonth = m; render(); return; }
  animateMonthChange(newIdx > oldIdx ? 'left' : 'right', ()=>{ currentMonth = m; render(); });
}
function shiftMonth(delta){
  const idx = MONTHS.indexOf(currentMonth);
  const newIdx = idx + delta;
  if(newIdx < 0 || newIdx >= MONTHS.length) return;
  animateMonthChange(delta > 0 ? 'left' : 'right', ()=>{ currentMonth = MONTHS[newIdx]; render(); });
}
function updateGoal(v){ state.annualGoal = Number(v||0); saveState(); render(); notifyChange('已更新年度存款目標'); }
function updateBonus(v){ state.bonus = Number(v||0); saveState(); render(); notifyChange('已更新年終／獎金'); }
function updateWishlistField(key,field,v){
  if(!state.wishlist[key]) state.wishlist[key]={};
  state.wishlist[key][field] = Number(v||0);
  saveState(); render();
  const label = field==='target' ? '已更新目標金額' : field==='threshold' ? '已更新每月可存門檻' : '已更新手動加碼金額';
  notifyChange(label);
}
function updateIncome(m,who,v){ if(!state.income[m]) state.income[m] = {xuan:0,wei:0}; state.income[m][who] = Number(v||0); saveState(); render(); notifyChange('已更新收入'); }
function updateBudget(cat,v){ state.budgets[cat] = Number(v||0); saveState(); render(); notifyChange('已更新預算上限'); }

function toggleManualExtraEdit(key, val){
  manualExtraEditing[key] = (val !== undefined) ? val : !manualExtraEditing[key];

}
function saveManualExtra(key){
  const input = document.getElementById('manualExtraInput-'+key);
  const v = input ? input.value : 0;

function toggleResetConfirm(val){

function confirmResetAllData(){

function saveTransaction(){
  const month = document.getElementById('txMonth').value;
  const amount = Number(document.getElementById('txAmount').value||0);
  const note = document.getElementById('txNote').value.trim();
  if(!amount || amount<=0){ alert('請輸入金額'); return; }
  state.transactions.push({ id:'t'+Date.now(), month, method:modalMethod, category:modalCat, amount, note });
  saveState(); closeModal(); currentMonth = month; switchView('ledger');
  pushNotify(`已新增一筆帳目：${modalCat} NT$ ${fmt(amount)}`);
}

function deleteTransaction(id){
  const idx = state.transactions.findIndex(t=>t.id===id);
  if(idx===-1) return;
  lastDeleted = {item: state.transactions[idx], idx};
  state.transactions.splice(idx,1);
  saveState(); render();
  showSnackbar('已刪除帳目', true);
  pushNotify('已刪除一筆帳目');
}
function undoDelete(){
  if(!lastDeleted) return;
  state.transactions.splice(lastDeleted.idx, 0, lastDeleted.item);
  lastDeleted = null; saveState(); render(); hideSnackbar();
}
function showSnackbar(text, showUndo){
  document.getElementById('snackbarText').textContent = text;
  document.getElementById('snackbarUndo').style.display = showUndo ? 'inline-block' : 'none';
  document.getElementById('snackbar').classList.add('show');
  clearTimeout(snackTimer); snackTimer = setTimeout(hideSnackbar, 4000);
}
function hideSnackbar(){ document.getElementById('snackbar').classList.remove('show'); }
</script>
</body>
</html>
